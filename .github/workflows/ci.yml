name: CI

on:
  push:
    branches: [ 'main', 'feature-*' ]
  pull_request:
    branches: [ 'main', 'feature-*' ]
  release:
    types: [ published ]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test Varnish latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Stable Rust
        uses: dtolnay/rust-toolchain@stable
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: just }
      - run: just install-varnish
      - run: just ci-test-latest

  test-varnish-ver:
    name: Test Varnish ${{ matrix.ver }}
    runs-on: ubuntu-latest
    env:
      VARNISH_INSTALL_DIR: '/tmp/varnish-trunk'
    strategy:
      fail-fast: false  # Run all the tests even if some fail
      matrix:
        include:
          - ver: trunk
          # This list must match the justfile list for supported_varnish_vers var without the latest version
          - ver: 9.0.0
          - ver: 8.0.0
    steps:
      - uses: actions/checkout@v6
      - name: Install Stable Rust
        uses: dtolnay/rust-toolchain@stable
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: just }
      - name: Install Varnish (trunk)
        if: matrix.ver == 'trunk'
        run: just install-varnish trunk
      - name: Install Varnish (non-trunk)
        if: matrix.ver != 'trunk'
        run: just install-varnish ${{ matrix.ver }}
      - name: Build and Test (trunk)
        if: matrix.ver == 'trunk'
        run: just ci-test-trunk "$VARNISH_INSTALL_DIR"
      - name: Build and Test (non-trunk)
        if: matrix.ver != 'trunk'
        run: just ci-test

  test-msrv:
    name: Test MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: just }
      - name: Read MSRV
        id: msrv
        run: echo "value=$(just get-msrv)" >> $GITHUB_OUTPUT
      - name: Install MSRV Rust ${{ steps.msrv.outputs.value }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.msrv.outputs.value }}
          # rustfmt is used by the tests
          components: rustfmt
      - run: just install-varnish
      - run: just ci_mode=0 ci-test-msrv  # Ignore warnings in MSRV

  # Ensure that the docs can be built at docs.rs without varnish dependencies
  test-docs-rs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Stable Rust
        uses: dtolnay/rust-toolchain@stable
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: just }
      - name: Ensure docs can be built at docs.rs without varnish dependencies
        run: just test-doc

  # Smoke test on macOS. brew ships current Varnish (9.0.x) with arm64 bottles,
  # so installation is fast. We bypass `just ci-test` because the Justfile's
  # version-detection and Varnish install recipes are Debian-specific (dpkg/apt).
  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Stable Rust
        uses: dtolnay/rust-toolchain@stable
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
      - name: Install Varnish
        run: brew install varnish
      - name: Build workspace
        run: cargo build --workspace --all-features --all-targets
      - name: Run tests
        run: cargo test --workspace --all-features

  # This job checks if any of the previous jobs failed or were canceled.
  # This approach also allows some jobs to be skipped if they are not needed.
  ci-passed:
    needs: [ test, test-varnish-ver, test-msrv, test-docs-rs, test-macos ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

  # Release unpublished packages or create a PR with changes
  release-plz:
    needs: [ ci-passed ]
    if: |
      always()
      && needs.ci-passed.result == 'success'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && github.repository_owner == 'varnish-rs'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Install Stable Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with: { tool: just }
      - run: just install-varnish
      - name: Publish to crates.io if crate's version is newer
        uses: release-plz/action@v0.5
        id: release
        with: { command: release }
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: If version is the same, create a PR proposing new version and changelog for the next release
        uses: release-plz/action@v0.5
        if: ${{ steps.release.outputs.releases_created == 'false' }}
        with: { command: release-pr }
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
